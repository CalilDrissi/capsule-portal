# Production override — layer ON TOP of mayan-edms/docker/docker-compose.yml.
#
# Bring up from the REPO ROOT so relative paths resolve against the FIRST
# compose file's directory (mayan-edms/docker/):
#
#   docker compose \
#     -f mayan-edms/docker/docker-compose.yml \
#     -f deploy/docker-compose.prod.yml \
#     --env-file deploy/.env.prod \
#     --profile all_in_one up -d --build
#
# What this override does vs. the dev override:
#   - builds a derived image with capsule_org BAKED IN (no source bind-mount)
#   - drops the dev `platform: linux/amd64` line (native amd64 VPS)
#   - removes the public 8800 port  -> app reachable only inside the `mayan` net
#   - adds a Caddy reverse proxy that terminates TLS (auto Let's Encrypt),
#     serves the built SPA at `/`, and proxies /api,/static,/admin,/media,favicon
#     to app:8000 so SPA + API are same-origin.
#
# All relative paths below are relative to mayan-edms/docker/ (the first -f file's
# directory, which Compose uses as the project directory).

services:
  app:
    # No `platform:` here on purpose (dev-only Rosetta shim). No source bind-mount.
    build:
      context: ../..
      dockerfile: deploy/Dockerfile.capsule
    image: capsule-mayan:prod
    # Load the production env into the container (MAYAN_SECRET_KEY, ALLOWED_HOSTS,
    # CORS, proxy/CSRF settings, datastore passwords). Appended to the base
    # env_file list, so the base .env (MAYAN_DOCKER_WAIT etc.) still loads.
    env_file:
      - ../../deploy/.env.prod
    environment:
      # Register the custom tenancy app (matches the dev override).
      MAYAN_COMMON_EXTRA_APPS: "[mayan.apps.capsule_org.apps.CapsuleOrgApp]"
    # Remove the public frontend port; only Caddy talks to app:8000 internally.
    # `!override` fully replaces the base `ports` list (a plain `[]` would merge
    # and leave the base 80:8000 mapping in place, colliding with Caddy).
    ports: !override []

  caddy:
    image: caddy:2-alpine
    depends_on:
      app:
        condition: service_healthy
        required: false
    environment:
      CAPSULE_DOMAIN: ${CAPSULE_DOMAIN:?set CAPSULE_DOMAIN in deploy/.env.prod}
      CAPSULE_ACME_EMAIL: ${CAPSULE_ACME_EMAIL:?set CAPSULE_ACME_EMAIL in deploy/.env.prod}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    networks:
      - mayan
    restart: unless-stopped
    volumes:
      - ../../deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Built SPA (capsule-web/dist) served read-only as the site root.
      - ../../capsule-web/dist:/srv/spa:ro
      - caddy_data:/data
      - caddy_config:/config
    # Run under the all_in_one profile so it comes up with the app.
    profiles:
      - all_in_one

volumes:
  caddy_data:
  caddy_config:
